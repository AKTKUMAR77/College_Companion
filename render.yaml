services:
  - type: web
    name: college-companion-backend
    runtime: python
    rootDir: college_companion_backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: ALLOW_INSECURE_DEFAULT_ADMIN
        value: "0"
      # Set these in Render dashboard before go-live:
      # - key: CORS_ORIGINS
      #   value: https://<your-frontend-domain>
      # - key: ADMIN_PASSWORD
      #   value: <strong-secret>
